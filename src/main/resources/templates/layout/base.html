<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title layout:fragment="title">Title</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- UIKIT -->
    <link rel="stylesheet" href="/uikit/css/uikit.min.css"/>
    <script src="/uikit/js/uikit.min.js"></script>
    <script src="/uikit/js/uikit-icons.min.js"></script>
    <!-- /UIKIT -->
    <!-- ENI -->
    <link rel="stylesheet" href="/eni/eni-styles.css"/>
    <!-- /ENI -->
</head>
<body>
<!--HEADER-->
<header style="background-color: #fff; border-bottom: 1px solid #f2f2f2"
        data-uk-sticky="show-on-up: true; animation: uk-animation-slide-top">
    <div class="uk-container">
        <nav id="navbar" data-uk-navbar="mode: click;">
            <div class="uk-navbar-left">
                <ul class="uk-navbar-nav">
                    <!-- SI CONNECTE -->
                    <li th:if="${loggedUser}">
                        <a href="#" data-uk-icon="icon:user"></a>
                        <div class="uk-navbar-dropdown uk-navbar-dropdown-bottom-left">
                            <ul class="uk-nav uk-navbar-dropdown-nav">
                                <li class="uk-nav-header uk-text-small uk-text-primary" th:text="'Bonjour ' + ${loggedUser.pseudo}"></li>
                                <li class="uk-nav-divider"></li>
                                <li><a href="/logout"><span data-uk-icon="icon: sign-out"></span> [[#{Btn_Logout}]]</a></li>
                            </ul>
                        </div>
                    </li>
                    <!-- SI PAS CONNECTE -->
                    <div class="uk-navbar-item" th:if="${loggedUser == null}">
                        <a href="/login" class="uk-button uk-button-primary uk-visible@m"> [[#{Btn_Login}]]</a>
                    </div>
                </ul>

            </div>
            <div class="uk-navbar-center">
                <a class="uk-navbar-item uk-logo" href="/">[[#{Title_App}]]</a>
            </div>
            <div class="uk-navbar-right">

                <div class="uk-navbar-item">
                    <a class="uk-navbar-toggle uk-hidden@m" data-uk-toggle data-uk-navbar-toggle-icon
                       href="#offcanvas-nav"></a>
                </div>
            </div>
        </nav>
    </div>
</header>
<!--/HEADER-->

<!--CONTENT-->
<div class="uk-height-viewport" style="min-height: 81vh;">

    <section class="uk-section uk-article">
        <div class="uk-container">

            <div th:if="${flashMessage}" th:attr="class=${flashMessage.getClassName()}" uk-alert>
                <a href class="uk-alert-close" uk-close></a>
                <p th:text="${flashMessage.message}"></p>
            </div>

            <div layout:fragment="content"></div>

        </div>
    </section>

</div>
<!--/CONTENT-->

<!--FOOTER-->
<footer class="uk-section uk-section-small uk-section-secondary">
    <div class="uk-container">
        <p class="uk-text-small uk-text-center">Copyright 2026 - <a href="https://github.com/zzseba78/Kick-Off">Created
            by KickOff</a> | Built with <a href="http://getuikit.com" title="Visit UIkit 3 site" target="_blank"
                                           data-uk-tooltip><span data-uk-icon="uikit"></span></a></p>
    </div>
</footer>
<!--/FOOTER-->
