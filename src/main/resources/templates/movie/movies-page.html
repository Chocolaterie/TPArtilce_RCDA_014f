<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en"
      layout:decorate="~{layout/base}"
>
<body>

<title layout:fragment="title">[[#{Title_Movies_List}]]</title>

<div layout:fragment="content">
    <h1>[[#{Title_Movies_List}]]</h1>

    <div class="uk-child-width-1-2@s uk-grid-match" uk-grid>
        <div th:each="movie: ${movies}">
            <div class="uk-card uk-card-secondary uk-card-hover uk-card-body">
                <h3 class="uk-card-title" th:text="${movie.title}"></h3>
                <span>Director: [[${movie.director.getDisplayName()}]]</span><br>
                <span>Genre: [[${movie.genre.title}]]</span>

                <h4>Actors</h4>
                <ul>
                    <li th:each="actor : ${movie.actors}">[[${actor.getDisplayName() }]]</li>
                </ul>

                <p th:text="${movie.synopsis}"></p>
                <a class="uk-button uk-button-primary" th:href="@{/show-movie/{id}(id=${movie.id})}">Show</a>
                <a class="uk-button uk-button-primary" th:href="@{/movie-form/{id}(id=${movie.id})}">Edit</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
